{% extends "base.html" %}
{% block content %}

<div class="center">

    <h2>🆕 Criar Conta</h2>

    <form method="POST">
        <input name="username" placeholder="Usuário" required>
        <input name="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Senha" required>
        <button>Cadastrar</button>
    </form>

    <br>
    <a href="/">
        <button>Voltar</button>
    </a>

</div>

{% endblock %}
