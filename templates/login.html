{% extends "base.html" %}
{% block content %}

<div class="center">

    <h2>🔐 Entrar</h2>

    <form method="POST">
        <input name="username" placeholder="Usuário" required>
        <input name="password" type="password" placeholder="Senha" required>
        <button>Entrar</button>
    </form>

    <p>Não tem conta?</p>
    <a href="/register">
        <button>Criar conta</button>
    </a>

</div>

{% endblock %}
