<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="top">
Plano: {{plano}} | Restante: {{restante}}
<a href="/upgrade">Upgrade</a>
<a href="/logout">Sair</a>
</div>

<form method="POST">
<input name="query" placeholder="Buscar vídeos..." required>
<button>Buscar</button>
</form>

<div class="grid">
{% for v in videos %}
<div class="card">
<form method="POST" action="/download">
<video src="{{v.video}}" controls></video>
<p>❤️ {{v.likes}}</p>
<input type="hidden" name="video" value="{{v.video}}">
<button>Baixar</button>
</form>
</div>
{% endfor %}
</div>

</body>
</html>
