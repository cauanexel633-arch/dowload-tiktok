<link rel="stylesheet" href="/static/style.css">

<div class="container">
    <h1>🔥 TikTok Downloader</h1>

    <form method="post">
        <input name="url" placeholder="Cole o link do TikTok">
        <button>Baixar</button>
    </form>

    {% if erro %}
        <p class="erro">{{ erro }}</p>
    {% endif %}

    {% if video %}
        <a href="/download?file={{ video }}" class="download">
            ⬇️ Baixar Vídeo
        </a>
    {% endif %}

    <a href="/logout">Sair</a>
</div>
