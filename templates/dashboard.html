<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">

<h1>🎬 Baixar TikTok</h1>

<div class="card">
<form method="POST">
<input name="link" placeholder="Cole o link do TikTok">
<button>Buscar</button>
</form>

{% if erro %}
<p style="color:red;">{{ erro }}</p>
{% endif %}
</div>

{% if video_url %}
<div class="card">
<video controls>
<source src="{{ video_url }}">
</video>

<form method="POST" action="/download">
<input type="hidden" name="video_url" value="{{ video_url }}">
<button>⬇️ Baixar</button>
</form>
</div>
{% endif %}

<div class="card">
<h3>Histórico</h3>

{% for item in historico %}
<div class="history-item">{{ item.link }}</div>
{% endfor %}

</div>

<a href="/logout">Sair</a>

</div>

</body>
</html>
